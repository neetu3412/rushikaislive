{% extends 'base.html' %}
{% block content %}
<div class="form-container">
    <h2>Create Account</h2>
    <p class="limit-tracker">User Limit: {{ user_count }} / 100000 Registered</p>
    
    {% if user_count < 100000 %}
    <form method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="address" placeholder="Address" required>
        <input type="text" name="phone" placeholder="Phone Number" required>

        <button type="submit" class="btn-primary">Register Now</button>
    </form>
    {% else %}
    <div class="alert error">Registration is currently locked. Limit reached.</div>
    {% endif %}
</div>
{% endblock %}
