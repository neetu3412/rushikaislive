{% extends 'base.html' %}
{% block content %}
<div class="dashboard-header">
    <h1>Welcome to Rushika ia Live</h1>
    <p>Your premium light-theme gaming dashboard.</p>
</div>

<div class="media-section">
    <div class="card stream-card">
        <h3>Featured Stream</h3>
        <iframe width="100%" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
        <div class="card-actions">
            <button class="like-btn">💙 Like Stream</button>
        </div>
    </div>
    
    <div class="gallery-section">
        <div class="card image-card">
            <img src="https://images.unsplash.com/photo-1538481199705-c710c4e965fc?auto=format&fit=crop&w=400&q=80" alt="Gaming Setup">
            <h4>Pro Setup Guide</h4>
        </div>
        <div class="card image-card">
            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=400&q=80" alt="Esports">
            <h4>Tournament Highlights</h4>
        </div>
    </div>
</div>
{% endblock %}
